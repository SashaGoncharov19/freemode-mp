name: Build FreeMode MP (Cross-platform)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ========================================================================
  # Server builds (cross-platform)
  # ========================================================================
  
  build-server-macos:
    name: Build Server (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - run: cargo build --package freemode-server --package freemode-shared --package freemode-sdk --release
      - uses: actions/upload-artifact@v4
        with:
          name: freemode-server-macos
          path: target/release/freemode-server
          retention-days: 7

  build-server-linux:
    name: Build Server (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - run: cargo build --package freemode-server --package freemode-shared --package freemode-sdk --target x86_64-unknown-linux-gnu --release
      - uses: actions/upload-artifact@v4
        with:
          name: freemode-server-linux
          path: target/x86_64-unknown-linux-gnu/release/freemode-server
          retention-days: 7

  # ========================================================================
  # Launcher + Client DLL (Windows)
  # ========================================================================
  
  build-windows-artifacts:
    name: Build Windows Artifacts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      
      - name: Build server (Windows)
        run: |
          cargo build --package freemode-server --package freemode-shared --package freemode-sdk --target x86_64-pc-windows-msvc --release
        
      - name: Build launcher (Windows)
        run: |
          cargo build --package freemode-launcher --target x86_64-pc-windows-msvc --release

      - name: Build client DLL (Windows)
        run: |
          cargo build --package freemode-client --target x86_64-pc-windows-msvc --release

      - name: Prepare release folder
        run: |
          mkdir -p release
          # Server binary
          cp target/x86_64-pc-windows-msvc/release/freemode-server.exe release/
          # Launcher + client DLL
          cp target/x86_64-pc-windows-msvc/release/freemode-launcher.exe release/
          cp target/x86_64-pc-windows-msvc/release/freemode-client.dll release/
          # Copy config / server list templates
          echo '{"game_path":null,"selected_server":null,"autorun":false,"theme":"dark","last_server":null}' > release/config.json
          cat > release/servers.json << 'EOF'
          [
            {"name":"FreeMode Main","ip":"127.0.0.1","port":30120}
          ]
          EOF

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freemode-windows-full
          path: release/
          retention-days: 7